<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs - StudyXpert</title>
  <link rel="stylesheet" href="../styles/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div id="navbar-container"></div>
  <script src="/open-deep-research/public/components/navbar-loader.js"></script>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold text-center mb-8">Job Opportunities</h1>
    
    <section class="bg-white rounded-lg shadow-lg p-8 mb-6">
      <h2 class="text-2xl font-semibold mb-4">Latest Job Openings</h2>
      <p class="text-gray-700 mb-6">Discover exciting career opportunities that match your skills.</p>
      
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="border rounded-lg p-4 hover:shadow-lg transition">
          <h3 class="font-semibold text-lg mb-2">Frontend Developer</h3>
          <p class="text-gray-600 mb-2">InnovateTech • Full-time • $60k-80k</p>
          <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm">Apply Now</span>
        </div>
        
        <div class="border rounded-lg p-4 hover:shadow-lg transition">
          <h3 class="font-semibold text-lg mb-2">Backend Engineer</h3>
          <p class="text-gray-600 mb-2">CloudSystems • Full-time • $70k-90k</p>
          <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm">Apply Now</span>
        </div>
        
        <div class="border rounded-lg p-4 hover:shadow-lg transition">
          <h3 class="font-semibold text-lg mb-2">Product Manager</h3>
          <p class="text-gray-600 mb-2">StartupX • Full-time • $80k-100k</p>
          <span class="bg-purple-100 text-purple-800 px-2 py-1 rounded text-sm">Apply Now</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
