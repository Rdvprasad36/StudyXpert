<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Internship Portal</title>
  <link rel="stylesheet" href="../styles/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">
  <div id="navbar"></div>
  <script src="./components/navbar.js"></script>

  <!-- Hero Section -->
  <section class="text-center px-8 py-12 bg-white bg-opacity-90">
    <h1 class="text-4xl font-bold mb-2">Explore <span class="text-blue-800">Internship Opportunities</span></h1>
    <p class="mb-4 text-gray-600">Discover exciting internships and launch your career today!</p>
    <div class="flex justify-center gap-4">
      <button onclick="showFindInternships()" class="bg-blue-900 text-white px-6 py-2 rounded">Find Internships</button>
      <button onclick="showPostForm()" class="border border-blue-900 text-blue-900 px-6 py-2 rounded">Post Internships</button>
    </div>
  </section>

  <!-- Internship Categories -->
  <section class="px-8 py-6 bg-white bg-opacity-90">
    <h2 class="text-xl font-semibold mb-4">Internship Categories</h2>
    <div class="flex flex-wrap gap-4">
      <button onclick="filterByRole('')" class="bg-gray-200 px-4 py-2 rounded">All</button>
      <button onclick="filterByRole('💻Software Development')" class="bg-gray-200 px-4 py-2 rounded">💻 Software Development</button>
      <button onclick="filterByRole('🧑‍💼Human Resources')" class="bg-gray-200 px-4 py-2 rounded">🧑‍💼 Human Resources</button>
      <button onclick="filterByRole('📢Marketing')" class="bg-gray-200 px-4 py-2 rounded">📢 Marketing</button>
      <button onclick="filterByRole('💰Finance')" class="bg-gray-200 px-4 py-2 rounded">💰 Finance</button>
    </div>
  </section>

  <!-- Post Internship Form -->
  <section id="postSection" class="hidden px-8 py-10 bg-white bg-opacity-90 relative z-10">
    <div class="max-w-2xl mx-auto bg-gray-50 p-6 rounded shadow" style="position: fixed; top: 80px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; z-index: 1000; box-shadow: 0 8px 16px rgba(0,0,0,0.25);">
      <h2 class="text-2xl font-semibold mb-4">Post an Internship</h2>
      <form id="internshipForm" class="space-y-4">
        <input type="text" id="company" placeholder="Company Name" class="w-full border px-4 py-2 rounded" required>
        <input type="text" id="specialization" placeholder="Specialization" class="w-full border px-4 py-2 rounded" required>
        <select id="role" class="w-full border px-4 py-2 rounded" required>
          <option value="">Select Role</option>
          <option>💻Software Development</option>
          <option>🧑‍💼Human Resources</option>
          <option>📢Marketing</option>
          <option>💰Finance</option>
        </select>
        <input type="text" id="stipend" placeholder="Stipend (₹)" class="w-full border px-4 py-2 rounded" required>
        <input type="date" id="lastDate" class="w-full border px-4 py-2 rounded" required>
        <input type="url" id="logo" placeholder="Company Logo URL" class="w-full border px-4 py-2 rounded" required>
        <textarea id="details" placeholder="Responsibilities and Requirements" class="w-full border px-4 py-2 rounded" rows="4" required></textarea>
        <button type="submit" class="w-full bg-blue-800 text-white px-4 py-2 rounded">Submit Internship</button>
      </form>
    </div>

    <!-- Your Posted Internships -->
    <div class="max-w-5xl mx-auto mt-10">
      <h3 class="text-xl font-bold mb-4">Your Posted Internships</h3>
      <div id="yourInternshipList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>
  </section>

  <!-- Find Internships -->
  <section id="findSection" class="px-8 py-10 bg-white bg-opacity-90">
    <div id="internshipList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
  </section>

  <!-- Apply Modal -->
  <div id="applyModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded shadow max-w-sm w-full">
      <h3 class="text-xl font-semibold mb-4">Application Form</h3>
      <form id="appForm" class="space-y-4">
        <input type="email" placeholder="Email" class="w-full border px-4 py-2 rounded" required/>
        <input type="tel" placeholder="Mobile Number" class="w-full border px-4 py-2 rounded" required/>
        <button type="submit" class="w-full bg-green-600 text-white px-4 py-2 rounded">Submit Application</button>
        <button type="button" onclick="closeApply()" class="w-full mt-2 bg-gray-300 text-gray-700 px-4 py-2 rounded">Cancel</button>
      </form>
    </div>
  </div>

  <!-- Job Details Modal -->
  <div id="jobDetailModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded shadow max-w-lg w-full">
      <h3 class="text-2xl font-bold mb-4 text-blue-800">Job Responsibilities & Requirements</h3>
      <p id="jobDetailText" class="text-gray-700 whitespace-pre-line mb-4"></p>
      <button onclick="closeJobDetails()" class="bg-blue-600 text-white px-4 py-2 rounded">Back</button>
    </div>
  </div>

  <script>
    const internships = [];
    const currentUser = 'user-' + Date.now();

    function showPostForm() {
      document.getElementById("postSection").classList.remove("hidden");
      document.getElementById("findSection").classList.add("hidden");
      renderInternships(true);
    }

    function showFindInternships() {
      document.getElementById("postSection").classList.add("hidden");
      document.getElementById("findSection").classList.remove("hidden");
      renderInternships(false);
    }

    function filterByRole(role) {
      showFindInternships();
      renderInternships(false, role);
    }

    function renderInternships(isPostView = false, filterRole = '') {
      const list = isPostView ? document.getElementById('yourInternshipList') : document.getElementById('internshipList');
      list.innerHTML = '';
      const filtered = filterRole ? internships.filter(i => i.role.trim() === filterRole.trim()) : internships;

      const toRender = isPostView ? filtered.filter(i => i.user === currentUser) : filtered;

      if (toRender.length === 0) {
        list.innerHTML = <p class="text-center text-gray-600 col-span-full">No internships ${filterRole ? 'on this role' : 'available'}.</p>;
        return;
      }

      toRender.forEach((intern, i) => {
        const div = document.createElement('div');
        div.className = 'bg-white p-6 rounded-lg shadow relative';

        div.innerHTML = `
          <div class="flex items-center gap-3 mb-2">
            <img src="${intern.logo}" alt="logo" class="w-10 h-10 rounded-full object-cover"/>
            <h3 class="text-lg font-bold">${intern.company}</h3>
          </div>
          <p class="text-blue-900 font-semibold">${intern.role}</p>
          <p>📌 ${intern.specialization}</p>
          <p>💰 ₹${intern.stipend}</p>
          <p>📅 Apply by: ${intern.lastDate}</p>
          <div class="mt-4 flex gap-2">
            <button onclick="openDetails(${i})" class="bg-blue-500 text-white px-3 py-1 rounded">Job Details</button>
            <button onclick="openApply()" class="bg-green-600 text-white px-3 py-1 rounded">Apply</button>
            ${isPostView ? <button onclick="deleteInternship(${i})" class="bg-red-600 text-white px-3 py-1 rounded">Delete</button> : ''}
          </div>`;
        list.appendChild(div);
      });
    }
    function openDetails(index) {
  const intern = internships[index];
  document.getElementById("jobDetailText").textContent = intern.details;
  document.getElementById("jobDetailModal").classList.remove("hidden");
   }


    function closeJobDetails() {
      document.getElementById("jobDetailModal").classList.add("hidden");
    }

    function openApply() {
      document.getElementById("applyModal").classList.remove("hidden");
    }

    function closeApply() {
      document.getElementById("applyModal").classList.add("hidden");
    }

    document.getElementById("internshipForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const form = e.target;
      internships.push({
        company: form.company.value,
        specialization: form.specialization.value,
        role: form.role.value,
        stipend: form.stipend.value,
        lastDate: form.lastDate.value,
        logo: form.logo.value,
        details: form.details.value,
        user: currentUser
      });
      form.reset();
      showFindInternships();
    });

    document.getElementById("appForm").addEventListener("submit", function(e) {
      e.preventDefault();
      closeApply();
      alert("You have successfully applied for the internship!");
      e.target.reset();
    });

    function deleteInternship(idx) {
      if (internships[idx].user === currentUser) {
        internships.splice(idx, 1);
        renderInternships(true);
      }
    }

    // Load Find Internships by default
    window.onload = showFindInternships;
  </script>
</body>
</html>
