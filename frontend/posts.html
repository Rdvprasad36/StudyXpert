<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Posts | StudyXpert</title>
  <link rel="stylesheet" href="../styles/styles.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #121212;
      color: #eee;
      overflow-x: hidden;
    }

    /* Animated bubbles */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }
    .bubble {
      position: absolute;
      bottom: -100px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      animation: rise 20s infinite ease-in;
      mix-blend-mode: screen;
    }
    @keyframes rise {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      50% { opacity: 0.4; }
      100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      backdrop-filter: blur(10px);
      background: rgba(0, 0, 0, 0.4);
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      font-size: 38px;
      margin-bottom: 25px;
      color: #ffd700;
    }

    .post-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .post-form input,
    .post-form textarea {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: #161515;
      font-size: 16px;
    }
    .post-form button {
      width: fit-content;
      align-self: flex-end;
      padding: 10px 20px;
      background: #ffd700;
      color: #121212;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .post-form button:hover {
      background: #e5c100;
    }

    .post-list {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .post-card {
      position: relative;
      background: linear-gradient(135deg, rgba(30,30,30,0.8), rgba(60,60,60,0.8));
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
      transition: transform 0.2s ease;
    }
    .post-card:hover {
      transform: translateY(-5px);
    }
    .post-title {
      font-size: 22px;
      color: #ffd700;
      margin-bottom: 8px;
    }
    .post-body {
      font-size: 16px;
      color: #ddd;
      margin-bottom: 12px;
    }
    .post-author {
      font-size: 14px;
      color: #bbb;
    }
    .delete-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      display: none;
    }
    .post-card.owned .delete-btn {
      display: block;
    }

    footer {
      text-align: center;
      margin: 50px 0 20px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="background" id="bg"></div>
  <div id="navbar"></div>

  <div class="container" style="background-color: #f9f9f9; padding: 20px; border-radius: 15px;">
    <h1>Community Posts</h1>
    <div class="post-form">
      <input type="text" id="postTitle" placeholder="Post title..." />
      <textarea id="postContent" rows="4" placeholder="What's on your mind?"></textarea>
      <button onclick="createPost()">Share</button>
    </div>

    <div class="post-list" id="postList"></div>
  </div>
</body>
</html>

  <script src="./components/navbar.js"></script>
  <script>
    // Bubble generator
    const bg = document.getElementById('bg');
    for(let i=0; i<30; i++){
      const b = document.createElement('div');
      const size = Math.random()*80 + 20;
      b.className = 'bubble';
      b.style.width = size+'px';
      b.style.height = size+'px';
      b.style.left = Math.random()*100 + 'vw';
      b.style.animationDuration = (10 + Math.random()*20) + 's';
      b.style.animationDelay = -(Math.random()*20) + 's';
      bg.appendChild(b);
    }

    const postList = document.getElementById('postList');
    const user = JSON.parse(localStorage.getItem('loggedInUser')) || {id:'guest', name:'Guest'};

    function loadPosts() {
      const posts = JSON.parse(localStorage.getItem('posts')||'[]');
      postList.innerHTML = '';
      posts.forEach((post,i)=>{
        const el = document.createElement('div');
        el.className = 'post-card' + (post.authorId===user.id?' owned':'');
        el.innerHTML = `
          <div class="post-title">${post.title}</div>
          <div class="post-body">${post.body}</div>
          <div class="post-author">Posted by: ${post.authorName}</div>
          <button class="delete-btn" onclick="deletePost(${i})">Delete</button>
        `;
        postList.appendChild(el);
      });
    }

    function createPost(){
      const t = document.getElementById('postTitle').value.trim();
      const b = document.getElementById('postContent').value.trim();
      if(!t||!b){ alert('Fill both fields.'); return; }
      const posts = JSON.parse(localStorage.getItem('posts')||'[]');
      posts.unshift({title:t, body:b, authorId:user.id, authorName:user.name});
      localStorage.setItem('posts', JSON.stringify(posts));
      document.querySelector('.post-form input').value='';
      document.querySelector('.post-form textarea').value='';
      loadPosts();
    }

    function deletePost(i){
      const posts = JSON.parse(localStorage.getItem('posts')||'[]');
      if(posts[i].authorId!==user.id) return;
      posts.splice(i,1);
      localStorage.setItem('posts', JSON.stringify(posts));
      loadPosts();
    }

    loadPosts();
  </script>
</body>
</html>
